# Публикация GitHub Release с JAR при push тега v*.*.*
# Сборка из корня репозитория (Gradle bootJar), вложение под стабильным именем.
name: Release JAR

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build bootJar
        run: ./gradlew bootJar --no-daemon

      - name: Стабильное имя для вложения (как в dist/)
        run: |
          mkdir -p dist
          cp build/libs/1C_mcp_bsl.jar dist/1C_mcp_bsl.jar
          ls -la dist/

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/1C_mcp_bsl.jar
          generate_release_notes: true
