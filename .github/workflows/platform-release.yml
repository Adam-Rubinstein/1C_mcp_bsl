name: Release & Publish (полный конвейер)

# Ручной запуск: тесты с установленной платформой 1С и publish в GitHub Packages.
# (GitHub Release с JAR — см. release-jar.yml при push тега v*.*.*.)
on:
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Установка 1С:Предприятие
        uses: 1CDevFlow/onec-setup-action@main
        with:
          type: onec
          onec_version: 8.3.27.1508
          cache: true
        env:
          ONEC_USERNAME: ${{ secrets.ONEC_USERNAME }}
          ONEC_PASSWORD: ${{ secrets.ONEC_PASSWORD }}
        timeout-minutes: 10

      - name: PLATFORM_PATH для тестов
        run: |
          grep -q '^PLATFORM_PATH=' gradle.properties && sed -i 's|^PLATFORM_PATH=.*|PLATFORM_PATH=/opt/1cv8/x86_64/8.3.27.1508|' gradle.properties \
            || echo 'PLATFORM_PATH=/opt/1cv8/x86_64/8.3.27.1508' >> gradle.properties

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Build application
        run: ./gradlew bootJar --no-daemon

      - name: Publish to GitHub Packages
        run: ./gradlew publish --no-daemon
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
